<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/Atividade20.css">
    <script src="../js/Atividade20.js"></script>
</head>

<body>
    <h1 class="title-boot">Login</h1>
    <div class="container-boot">
        <form class="form-boot">
            <div class="img-boot">
                <img src="../img/bootstrap-logo-shadow.png" alt="Logo">
            </div>
            <div class="mb-3">
                <label for="exampleInputEmail1" class="form-label">Digite o seu email</label>
                <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
            </div>
            <div class="mb-3">
                <label for="exampleInputPassword1" class="form-label">Digite a sua senha</label>
                <input type="password" class="form-control" id="exampleInputPassword1">
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="exampleCheck1">
                <label class="form-check-label" for="exampleCheck1">Verifique-me</label>
            </div>
            <div class="btn-area">
                <button type="submit" class="btn btn-primary" onclick="enviar()">Enviar</button>
            </div>
        </form>
    </div>
</body>

</html>
